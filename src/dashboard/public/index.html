<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>YouLi-AI Dashboard</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial; margin: 18px; }
      .card { border: 1px solid #ddd; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
      h1 { margin-top: 0; }
      pre { background: #f7f7f7; padding: 8px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>YouLi-AI Dashboard</h1>
    <div class="card">
      <strong>Uptime:</strong> <span id="uptime">-</span> ms
    </div>
    <div class="card">
      <strong>Active Tokens:</strong> <span id="activeTokens">-</span>
    </div>
    <div class="card">
      <strong>Last Decision:</strong>
      <pre id="lastDecision">-</pre>
    </div>

    <div class="card">
      <strong>Raw Metrics:</strong>
      <pre id="raw">-</pre>
    </div>

    <div class="card">
      <canvas id="chart" width="600" height="200"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const uptimeEl = document.getElementById('uptime');
      const activeEl = document.getElementById('activeTokens');
      const lastEl = document.getElementById('lastDecision');
      const rawEl = document.getElementById('raw');
      const chartCtx = document.getElementById('chart').getContext('2d');

      function update(data) {
        uptimeEl.textContent = data.uptimeMs.toFixed ? data.uptimeMs.toFixed(0) : data.uptimeMs;
        activeEl.textContent = data.activeTokens;
        lastEl.textContent = data.lastDecision || '-';
        rawEl.textContent = JSON.stringify(data, null, 2);
      }

      // Chart setup
      let historyData = [];
      const chart = new Chart(chartCtx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Active Tokens',
            data: [],
            borderColor: '#007bff',
            backgroundColor: 'rgba(0,123,255,0.1)',
            tension: 0.2,
          }]
        },
        options: {
          scales: {
            x: { type: 'time', time: { unit: 'second', displayFormats: { second: 'HH:mm:ss' } } },
            y: { beginAtZero: true }
          }
        }
      });

      function pushHistoryPoint(pt) {
        const ts = new Date(pt.timestamp);
        chart.data.labels.push(ts);
        chart.data.datasets[0].data.push(pt.activeTokens);
        // cap points
        if (chart.data.labels.length > 200) {
          chart.data.labels.shift();
          chart.data.datasets[0].data.shift();
        }
        chart.update('none');
      }

      // fetch initial status and history
      fetch('/api/status').then(r => r.json()).then(update).catch(()=>{});
      fetch('/api/history').then(r => r.json()).then(h => {
        if (Array.isArray(h)) {
          historyData = h.slice(-200);
          historyData.forEach(pushHistoryPoint);
          if (historyData.length > 0) update(historyData[historyData.length-1]);
        }
      }).catch(()=>{});

      const ws = new WebSocket((location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/ws');
      ws.addEventListener('message', (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'metrics') {
            update(msg.data);
            if (msg.history && Array.isArray(msg.history)) {
              // rebuild chart from history for robustness
              chart.data.labels = [];
              chart.data.datasets[0].data = [];
              msg.history.slice(-200).forEach(h => pushHistoryPoint(h));
            } else {
              pushHistoryPoint(msg.data);
            }
          }
        } catch(e){}
      });
    </script>
  </body>
</html>
